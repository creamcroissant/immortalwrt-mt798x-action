#
# https://github.com/P3TERX/Actions-OpenWrt
#
# File: .github/workflows/openwrt-bulder.yml
# Description: Build OpenWrt using GitHub Actions
#
# Updated: LinkEase Architecture Fix + v2ray-geodata 404 Fixed
#

name: immortalwrt-mt798x without_docker Builder

on:
  push:
    branches:
      - main
  pull_request:

env:
  REPO_URL: https://github.com/haniwc/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: mt789x_without_docker.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        # 移除 device-tree-compiler 避免与内置版本冲突(如果22.04有的话)，不过原列表基本适配
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
    - name: Free disk space
      run: |
        echo "Before cleanup:"
        df -h
        sudo rm -rf /opt/* /usr/local/* /home/linuxbrew
        sudo apt-get autoremove -y
        sudo apt-get clean
        docker system prune -a -f
        echo "After cleanup:"
        df -h

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds & Patch Broken Packages
      run: |
          cd openwrt && ./scripts/feeds install -a
          
          # =========================================================================
          # 📌 【补丁 1】修复 v2ray-geodata 编译 404/Hash 校验错误
          # 原因：官方Feed中的 geodata release 地址经常变动或失效
          # 方案：移除 feed 中的烂包，Ping 掉它并克隆 reliable 的 sbwml 版本
          # =========================================================================
          rm -rf feeds/packages/net/v2ray-geodata
          echo "Replacing broken v2ray-geodata from feeds..."
          git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata

          # =========================================================================
          # 常规三方 LuCI 下载
          # =========================================================================
          git clone https://github.com/ntlf9t/luci-app-easymesh.git package/feeds/luci/luci-app-easymesh
          git clone https://github.com/rufengsuixing/luci-app-adguardhome.git package/feeds/luci/luci-app-adguardhome
          git clone https://github.com/linkease/istore.git package/istore

          # =========================================================================
          # 📌 【补丁 2】LinkEase / QuickStart 架构不兼容终极修复
          # 原因：官方 Makefile 缺失 PKGARCH 或路径深，导致 MT798X 构建扫描跳过
          # 方案：手动“搬家”到 custom 目录 + 强制 hex inject 架构定义
          # =========================================================================
          mkdir -p package/custom

          # Clone & 搬家 (避免直接放在 feeds 路径)
          git clone https://github.com/linkease/nas-packages.git tmp_nas
          git clone https://github.com/linkease/nas-packages-luci.git tmp_nas_luci
          
          cp -r tmp_nas/network/services/linkease package/custom/
          cp -r tmp_nas/network/services/quickstart package/custom/
          cp -r tmp_nas_luci/luci/luci-app-linkease package/custom/
          cp -r tmp_nas_luci/luci/luci-app-quickstart package/custom/
          
          rm -rf tmp_nas tmp_nas_luci

          # 强制植入 PKGARCH 定义，彻底解决 ERROR 255
          for pkg in linkease quickstart luci-app-linkease luci-app-quickstart; do
              MF="package/custom/$pkg/Makefile"
              if [ -f "$MF" ]; then
                 echo "Patching architecture into $pkg..."
                 sed -i '/PKGARCH/d' "$MF"
                 sed -i '1a PKGARCH:=aarch64_cortex-a53' "$MF"
                 sed -i 's/+linkmount//g' "$MF"
              fi
          done

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        
        cd openwrt
        # 防止漏选
        echo "CONFIG_PACKAGE_linkease=y" >> .config
        echo "CONFIG_PACKAGE_quickstart=y" >> .config
        # 兼容性补充：手动开启 mosdns 等相关依赖（通常 geodata 是它们的前置）
        echo "CONFIG_v2ray-geodata=y" >> .config
        
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        
        # 使用 -j 输出错误但不中断，以允许重新尝试重度 404 包
        make download -j8
        
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 多重保险：先尝试全速，不行则单线程带详细日志
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        SAFE_NAME=$(echo $DEVICE_NAME | tr '-' '_')
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")_without_docker" >> $GITHUB_OUTPUT
        touch release.txt
        echo "📦 Fixed Build: LinkEase Arch + GeoData" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/**

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
