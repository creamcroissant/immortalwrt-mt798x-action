#
# 该 Workflow 包含自动上游监视 + 强制固件以极小积构建逻辑
# 
# 目标：Hanwckf immortalwrt-mt798x (无 Docker 版, 纯净版)
# 特性：自动化检测更新、强制移除巨型无用包 (Ruby/BTRFS/AdGuard)
#

name: MT798x Pure Builder (Smart Watch)

on:
  push:
    branches:
      - main
  # 定时任务：每天北京时间 4点, 10点, 16点, 22点 自动检查上游
  schedule:
    - cron: '0 20,2,8,14 * * *'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/hanwckf/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: mt789x_without_docker.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 1. 智能监视逻辑：如果不下载代码就能知道不需要编译，就别浪费资源
    - name: Check Upstream Commit Hash
      id: check_hash
      run: |
        # 获取上游仓库最新 Commit，无需下载
        COMMITS=$(git ls-remote "$REPO_URL" refs/heads/"$REPO_BRANCH" | awk '{print $1}')
        echo "Upstream Hash: $COMMITS"
        echo "commit_hash=$COMMITS" >> $GITHUB_OUTPUT
        echo "$COMMITS" > .upstream_hash

    - name: Cache Hash
      id: cache_check
      uses: actions/cache@v4
      with:
        paths: .upstream_hash
        key: upstream_${{ steps.check_hash.outputs.commit_hash }}

    - name: Cancel if No Update
      # 如果是定时任务 且 上游Hash没变 => 取消构建，显示绿色
      if: steps.cache_check.outputs.cache-hit == 'true' && github.event_name == 'schedule'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "✅ 上游仓库没有更新，为了节省资源，本次自动跳过。"
        gh run cancel ${{ github.run_id }}
        gh run watch ${{ github.run_id }}

    # 2. 如果判定需要更新，开始部署巨型编译环境
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Free disk space
      run: |
        echo "清理前空间:"
        df -h
        sudo rm -rf /opt/* /usr/local/* /home/linuxbrew >> /dev/null 2>&1 || true
        sudo apt-get autoremove -y > /dev/null 2>&1 || true
        sudo apt-get clean > /dev/null 2>&1 || true
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # 3. 针对 LinkEASE 业务的补丁注入
    - name: Install feeds & Apply Patches
      run: |
          cd openwrt
          ./scripts/feeds update -a
          
          # 修复 v2ray-geodata 导致的编译死锁
          rm -rf feeds/packages/net/v2ray-geodata
          git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata

          # 拉取必须插件
          git clone https://github.com/ntlf9t/luci-app-easymesh.git package/feeds/luci/luci-app-easymesh
          git clone https://github.com/linkease/istore.git package/istore

          # LinkEase / QuickStart 核心修复逻辑
          mkdir -p package/custom
          git clone https://github.com/linkease/nas-packages.git tmp_nas
          git clone https://github.com/linkease/nas-packages-luci.git tmp_nas_luci
          
          cp -r tmp_nas/network/services/linkease package/custom/
          cp -r tmp_nas/network/services/quickstart package/custom/
          cp -r tmp_nas_luci/luci/luci-app-linkease package/custom/
          cp -r tmp_nas_luci/luci/luci-app-quickstart package/custom/
          
          rm -rf tmp_nas tmp_nas_luci

          # 强制修改架构定义，防止不兼容报错
          for pkg in linkease quickstart luci-app-linkease luci-app-quickstart; do
              MF="package/custom/$pkg/Makefile"
              if [ -f "$MF" ]; then
                 sed -i '/PKGARCH/d' "$MF"
                 sed -i '1a PKGARCH:=aarch64_cortex-a53' "$MF"
                 sed -i 's/+linkmount//g' "$MF"
              fi
          done
          
          ./scripts/feeds install -a

    # 4. 配置加载与深度清洗 (防止垃圾死灰复燃)
    - name: Load & Clean Configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        
        cd openwrt
        
        # ⬇️ 无论 .config 原件写得如何，这里进行最后一次“核大杀器级”清洗
        echo "Running Deep Clean Processor..."
        
        # 1. 处死编程语言运行时 (节省 ~20MB)
        sed -i 's/^CONFIG_PACKAGE_ruby.*=y/# CONFIG_PACKAGE_ruby is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_node.*=y/# CONFIG_PACKAGE_node is not set/' .config
        
        # 2. 处死 AdGuardHome (节省 ~30MB)
        sed -i 's/^CONFIG_PACKAGE_.*adguardhome.*=y/# CONFIG_PACKAGE_luci-app-adguardhome is not set/' .config
        
        # 3. 处死 BTRFS 内核模块 (节省 ~10MB)
        sed -i 's/^CONFIG_PACKAGE_kmod-fs-btrfs.*=.*/# CONFIG_PACKAGE_kmod-fs-btrfs is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_btrfs-progs.*=.*/# CONFIG_PACKAGE_btrfs-progs is not set/' .config
        
        # 4. 处死多余容器引擎 (你选了 without_docker 但有些 config 可能会开)
        sed -i 's/^CONFIG_PACKAGE_.*containerd.*=y/# CONFIG_PACKAGE_containerd is not set/' .config
        
        # 5. 处死代理全家桶 (你已确认不需要)
        sed -i '/CONFIG_PACKAGE_.*v2ray.*/d' .config
        sed -i '/CONFIG_PACKAGE_.*xray.*/d' .config
        sed -i '/CONFIG_PACKAGE_.*naiveproxy.*/d' .config
        sed -i '/CONFIG_PACKAGE_.*passwall.*/d' .config
        sed -i '/CONFIG_PACKAGE_.*ssr-plus.*/d' .config
        
        # 6. 保活 LinkEase 
        grep -q "CONFIG_PACKAGE_linkease" .config || echo "CONFIG_PACKAGE_linkease=y" >> .config
        grep -q "CONFIG_PACKAGE_quickstart" .config || echo "CONFIG_PACKAGE_quickstart=y" >> .config
        
        # 应用自定义脚本并整理依赖
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 修复多行输出导致 ENV 崩溃的问题
        TARGET_DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -n 1)
        TARGET_DEVICE=${TARGET_DEVICE//-/_}
        [ -z "$TARGET_DEVICE" ] && TARGET_DEVICE="Generic"
        
        echo "DEVICE_NAME=_$TARGET_DEVICE" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        # 强力清理不上传的文件，只留 sysupgrade.bin
        cd openwrt/bin/targets/*/*
        rm -rf packages
        rm -f *.buildinfo 
        rm -f *.manifest
        # 干掉无用的 factory.bin 或者 kernel.bin，只留升级包
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")_Pure" >> $GITHUB_OUTPUT
        touch release.txt
        echo "📦 Clean OpenWrt Firmware" >> release.txt
        echo "- 净化版: 无AdGuard/无Docker/无Ruby" >> release.txt
        echo "- LinkEase & iStore 预装" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*sysupgrade.bin

    - name: Post-Cleanup
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
